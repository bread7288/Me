<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Now</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <div class="search-bar">
      <input id="city-input" type="text" placeholder="Search city..." autocomplete="off" />
      <button id="search-btn">Search</button>
      <button id="locate-btn" title="Use my location">&#9678;</button>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Fetching weather...</p>
    </div>

    <div id="error" class="hidden">
      <p id="error-msg"></p>
    </div>

    <div id="weather" class="hidden">

      <!-- CURRENT -->
      <div class="current-card">
        <div class="location">
          <span id="city-name"></span>
          <span id="country"></span>
        </div>
        <div class="date-time" id="datetime"></div>
        <div class="main-info">
          <div class="temp-block">
            <div class="temp" id="temp"></div>
            <div class="feels-like">Feels like <span id="feels"></span></div>
          </div>
          <div class="condition-block">
            <div class="condition-icon" id="cond-icon"></div>
            <div class="condition-text" id="cond-text"></div>
          </div>
        </div>
        <div class="details-grid">
          <div class="detail"><span class="label">Humidity</span><span id="humidity"></span></div>
          <div class="detail"><span class="label">Wind</span><span id="wind"></span></div>
          <div class="detail"><span class="label">Visibility</span><span id="visibility"></span></div>
          <div class="detail"><span class="label">Pressure</span><span id="pressure"></span></div>
          <div class="detail"><span class="label">Sunrise</span><span id="sunrise"></span></div>
          <div class="detail"><span class="label">Sunset</span><span id="sunset"></span></div>
        </div>
      </div>

      <!-- HOURLY -->
      <h3 class="section-label">Next 24 Hours</h3>
      <div class="hourly-scroll">
        <div class="hourly-track" id="hourly-track"></div>
      </div>

      <!-- 7-DAY -->
      <h3 class="section-label">7-Day Forecast</h3>
      <div class="daily-list" id="daily-list"></div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
