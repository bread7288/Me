<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wes's Weather World 🌈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background -->
  <div class="bg-layer" id="bg-layer">
    <div class="particles" id="particles"></div>
  </div>

  <div class="app">

    <!-- TITLE -->
    <div class="site-title">
      <span class="title-icon" id="title-icon">🌤️</span>
      <h1>Wes's Weather World!</h1>
    </div>

    <!-- SEARCH + CONTROLS -->
    <div class="top-bar">
      <div class="search-bar">
        <input id="city-input" type="text" placeholder="🔍 Type a city name..." autocomplete="off" />
        <button id="search-btn">Go!</button>
        <button id="locate-btn" title="Find my location">📍</button>
      </div>
      <div class="controls">
        <button id="unit-toggle" class="unit-btn">Switch to °C</button>
        <div class="refresh-info" id="refresh-info"></div>
      </div>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Looking up the weather... ☁️</p>
    </div>

    <div id="error" class="hidden">
      <p id="error-msg"></p>
    </div>

    <div id="weather" class="hidden">

      <!-- CURRENT -->
      <div class="current-card">
        <div class="mascot-row">
          <div class="mascot" id="mascot"></div>
          <div class="location-block">
            <div class="location">📍 <span id="city-name"></span><span id="country"></span></div>
            <div class="date-time" id="datetime"></div>
          </div>
        </div>

        <div class="temp-row">
          <div class="temp" id="temp"></div>
          <div class="cond-block">
            <div class="condition-text" id="cond-text"></div>
            <div class="feels-like">Feels like <span id="feels"></span></div>
          </div>
        </div>

        <div class="details-grid">
          <div class="detail">
            <span class="d-icon">💧</span>
            <span class="label">Humidity</span>
            <span id="humidity"></span>
          </div>
          <div class="detail">
            <span class="d-icon">💨</span>
            <span class="label">Wind Speed</span>
            <span id="wind"></span>
          </div>
          <div class="detail">
            <span class="d-icon">🧭</span>
            <span class="label">Wind Points</span>
            <span id="wind-dir"></span>
          </div>
          <div class="detail">
            <span class="d-icon">👁️</span>
            <span class="label">Can See</span>
            <span id="visibility"></span>
          </div>
          <div class="detail">
            <span class="d-icon">☀️</span>
            <span class="label">Sun Power</span>
            <span id="uv"></span>
          </div>
          <div class="detail">
            <span class="d-icon">🌅</span>
            <span class="label">Sunrise</span>
            <span id="sunrise"></span>
          </div>
          <div class="detail">
            <span class="d-icon">🌇</span>
            <span class="label">Sunset</span>
            <span id="sunset"></span>
          </div>
        </div>
      </div>

      <!-- FUN FACT -->
      <div class="funfact-card" id="funfact-card">
        <span class="funfact-label">🌟 Did You Know?</span>
        <p id="funfact-text"></p>
      </div>

      <!-- HOURLY -->
      <h3 class="section-label">⏰ Next 24 Hours</h3>
      <div class="hourly-scroll">
        <div class="hourly-track" id="hourly-track"></div>
      </div>

      <!-- 7-DAY -->
      <h3 class="section-label">📅 This Week</h3>
      <div class="daily-list" id="daily-list"></div>

      <!-- TIP -->
      <div class="tip-card" id="tip-card"></div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
